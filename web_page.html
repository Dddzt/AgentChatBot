<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能对话机器人</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
        }

        /* 侧边栏 */
        .sidebar {
            width: 70px;
            background: #1e1e2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        .sidebar-logo {
            width: 45px;
            height: 45px;
            background: #2d2d3f;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .sidebar-logo svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-item {
            width: 45px;
            height: 45px;
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: #2d2d3f;
            color: #fff;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            margin-bottom: 3px;
        }

        .nav-item span {
            font-size: 10px;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        /* 顶部栏 */
        .header {
            height: 60px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #1e1e2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #2d2d3f;
        }

        .mode-tabs {
            display: flex;
            gap: 10px;
        }

        .mode-tab {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .mode-tab:hover {
            border-color: #1e1e2e;
        }

        .mode-tab.active {
            background: #1e1e2e;
            color: #fff;
            border-color: #1e1e2e;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .welcome-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: #1e1e2e;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .welcome-icon svg {
            width: 45px;
            height: 45px;
            fill: #fff;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .welcome-desc {
            color: #888;
            font-size: 15px;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 15px;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #667eea;
            color: #fff;
        }

        .message.assistant .message-avatar {
            background: #1e1e2e;
        }

        .message-avatar svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
        }

        .message.user .message-content {
            background: #667eea;
            color: #fff;
        }

        .message.assistant .message-content {
            background: #f5f5f5;
            color: #333;
        }

        /* Markdown样式 */
        .message-content pre {
            background: #f8f8f8;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-content code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-content p code {
            background: #f0f0f0;
            color: #c7254e;
            padding: 3px 6px;
            border-radius: 3px;
            font-size: 13px;
        }

        /* 代码高亮颜色覆盖 */
        .hljs-keyword {
            color: #0000ff !important;
        }

        /* 关键字：蓝色 */
        .hljs-built_in {
            color: #0000ff !important;
        }

        /* 内置函数：蓝色 */
        .hljs-string {
            color: #a31515 !important;
        }

        /* 字符串：红色 */
        .hljs-number {
            color: #098658 !important;
        }

        /* 数字：绿色 */
        .hljs-comment {
            color: #008000 !important;
        }

        /* 注释：绿色 */
        .hljs-function .hljs-title {
            color: #795e26 !important;
        }

        /* 函数名：棕色 */
        .hljs-params {
            color: #001080 !important;
        }

        /* 参数：深蓝色 */
        .hljs-literal {
            color: #0000ff !important;
        }

        /* True/False：蓝色 */
        .hljs-class .hljs-title {
            color: #267f99 !important;
        }

        /* 类名：青色 */

        .message-content h1,
        .message-content h2,
        .message-content h3 {
            margin: 15px 0 10px;
        }

        .message-content ul,
        .message-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }

        .message-content blockquote {
            border-left: 3px solid #667eea;
            padding-left: 15px;
            margin: 10px 0;
            color: #666;
        }

        .message-content table {
            border-collapse: collapse;
            margin: 10px 0;
            width: 100%;
        }

        .message-content th,
        .message-content td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }

        .message-content th {
            background: #f0f0f0;
        }

        /* 输入区域 */
        .input-section {
            border-top: 1px solid #eee;
            padding: 20px 30px;
        }

        .input-tools {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            color: #888;
            font-size: 13px;
        }

        .input-tool {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .input-tool:hover {
            color: #333;
        }

        /* 文件上传按钮样式 */
        .upload-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }

        .upload-btn:hover {
            background: #e0e0e0;
            border-color: #1e1e2e;
            color: #333;
        }

        .upload-btn input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .upload-btn svg {
            width: 16px;
            height: 16px;
        }

        /* 文件预览区域 */
        .file-preview {
            display: none;
            margin-bottom: 10px;
            padding: 10px 12px;
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 6px;
            font-size: 13px;
        }

        .file-preview.active {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .file-info-text {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #2e7d32;
        }

        .file-info-text svg {
            width: 18px;
            height: 18px;
            fill: #4caf50;
        }

        .remove-file-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 18px;
            transition: background 0.2s;
        }

        .remove-file-btn:hover {
            background: #ffcdd2;
            color: #c62828;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: #f5f5f5;
            border-radius: 12px;
            padding: 12px 16px;
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            outline: none;
            resize: none;
            max-height: 150px;
            min-height: 24px;
            line-height: 1.5;
            font-family: inherit;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .send-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 22px;
            height: 22px;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #888;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 滚动条样式 */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 3px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background: #ccc;
        }
    </style>
</head>

<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
            </svg>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item active" onclick="switchSection('chat')">
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z" />
                </svg>
                <span>对话</span>
            </button>
            <button class="nav-item" onclick="showHistory()">
                <svg viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />
                </svg>
                <span>历史</span>
            </button>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部栏 -->
        <header class="header">
            <button class="new-chat-btn" onclick="newChat()">
                <svg width="16" height="16" viewBox="0 0 24 24">
                    <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
                新对话
            </button>
            <div class="mode-tabs">
                <button class="mode-tab active" onclick="switchMode('chat', this)">聊天模式</button>
                <button class="mode-tab" onclick="switchMode('agent', this)">智能体模式</button>
            </div>
        </header>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="welcome-section" id="welcomeSection">
                <div class="welcome-icon">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" />
                    </svg>
                </div>
                <h1 class="welcome-title">小D智能助手</h1>
                <p class="welcome-desc">可以帮你完成各种任务，包括写作、分析、编程等。</p>
            </div>
            <div class="messages-list" id="messagesList"></div>
        </div>

        <!-- 输入区域 -->
        <section class="input-section">
            <!-- 文件预览 -->
            <div class="file-preview" id="filePreview">
                <div class="file-info-text">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15.01l1.41 1.41L11 14.84V19h2v-4.16l1.59 1.59L16 15.01 12.01 11z" />
                    </svg>
                    <span id="fileNameText">已选择文件</span>
                </div>
                <button class="remove-file-btn" onclick="removeFile()">×</button>
            </div>

            <div class="input-tools">
                <!-- 图片上传按钮 -->
                <label class="upload-btn" title="上传图片">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
                    </svg>
                    <span>图片</span>
                    <input type="file" id="imageInput" accept="image/*" onchange="handleImageUpload(event)">
                </label>

                <!-- 文件上传按钮 -->
                <label class="upload-btn" title="上传文件">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z" />
                    </svg>
                    <span>文件</span>
                    <input type="file" id="fileInput" accept=".txt,.md,.pdf,.doc,.docx,.mp3,.wav,.mp4,.avi"
                        onchange="handleFileUpload(event)">
                </label>

                <div class="input-tool" onclick="exportChat()">
                    <svg width="16" height="16" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z" />
                    </svg>
                    导出聊天记录
                </div>
            </div>
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="请输入消息（Shift+Enter换行，Enter发送）" rows="1"
                    onkeydown="handleKeyDown(event)" oninput="autoResizeTextarea(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <script>
        // 配置marked
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        let currentMode = 'chat';
        let messages = [];
        let isStreaming = false;
        let sessionId = generateSessionId();
        let currentFilePath = null;  // 当前上传文件的路径
        let currentFileName = null;  // 当前上传文件的名称

        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function switchSection(section) {
            // 只保留对话功能，不做其他处理
            if (section === 'chat') {
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                event.target.closest('.nav-item').classList.add('active');
            }
        }

        function switchMode(mode, btn) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(tab => tab.classList.remove('active'));
            btn.classList.add('active');

            const modeMap = {
                'chat': '聊天模式',
                'agent': '智能体模式',
            };
            const modeText = modeMap[mode] || '聊天模式';
            addSystemMessage(`已切换到${modeText}`);

            // 只在智能体模式下显示上传按钮
            const uploadButtons = document.querySelectorAll('.upload-btn');
            uploadButtons.forEach(btn => {
                btn.style.display = mode === 'agent' ? 'inline-flex' : 'none';
            });

            // 切换模式时清除已上传的文件
            if (currentFilePath) {
                removeFile();
            }
        }

        function newChat() {
            messages = [];
            sessionId = generateSessionId();
            document.getElementById('messagesList').innerHTML = '';
            document.getElementById('welcomeSection').style.display = 'flex';
            addSystemMessage('已开始新对话');
        }

        function addSystemMessage(text) {
            // 临时显示系统消息
            const container = document.getElementById('chatContainer');
            const notification = document.createElement('div');
            notification.style.cssText = 'text-align:center;color:#888;font-size:12px;padding:10px;';
            notification.textContent = text;
            container.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function addMessage(role, content) {
            document.getElementById('welcomeSection').style.display = 'none';

            const list = document.getElementById('messagesList');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatarSvg = role === 'user'
                ? '<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'
                : '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';

            div.innerHTML = `
                <div class="message-avatar">${avatarSvg}</div>
                <div class="message-content">${role === 'assistant' ? marked.parse(content) : escapeHtml(content)}</div>
            `;

            list.appendChild(div);
            scrollToBottom();

            // 代码高亮
            div.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });

            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addTypingIndicator() {
            document.getElementById('welcomeSection').style.display = 'none';

            const list = document.getElementById('messagesList');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingMessage';
            div.innerHTML = `
                <div class="message-avatar">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            list.appendChild(div);
            scrollToBottom();
            return div;
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        // 处理键盘事件（支持Shift+Enter换行，Enter发送）
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 保留旧函数以兼容
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // 自动调整textarea高度
        function autoResizeTextarea(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        // 处理图片上传
        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 检查文件类型
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件！');
                event.target.value = '';
                return;
            }

            // 检查文件大小（50MB）
            if (file.size > 50 * 1024 * 1024) {
                alert('文件大小不能超过50MB！');
                event.target.value = '';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                // 显示上传中状态
                showFilePreview('上传中...', true);

                const response = await fetch('/upload/image', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    currentFilePath = result.file_path;
                    currentFileName = result.file_name;
                    showFilePreview(`🖼️ ${result.file_name}`);

                    // 聚焦输入框，用户可以直接输入问题
                    document.getElementById('userInput').focus();
                } else {
                    alert('图片上传失败：' + result.error);
                    hideFilePreview();
                }
            } catch (error) {
                alert('图片上传失败：' + error.message);
                hideFilePreview();
            }

            event.target.value = '';  // 清空输入
        }

        // 处理文件上传
        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 检查文件大小（50MB）
            if (file.size > 50 * 1024 * 1024) {
                alert('文件大小不能超过50MB！');
                event.target.value = '';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                // 显示上传中状态
                showFilePreview('上传中...', true);

                const response = await fetch('/upload/file', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    currentFilePath = result.file_path;
                    currentFileName = result.file_name;

                    // 根据文件类型显示不同图标
                    const typeIcon = {
                        'document': '📄',
                        'audio': '🎧',
                        'video': '🎥',
                        'image': '🖼️'
                    };
                    const icon = typeIcon[result.file_type] || '📁';

                    showFilePreview(`${icon} ${result.file_name}`);

                    // 聚焦输入框，用户可以直接输入问题
                    document.getElementById('userInput').focus();
                } else {
                    alert('文件上传失败：' + result.error);
                    hideFilePreview();
                }
            } catch (error) {
                alert('文件上传失败：' + error.message);
                hideFilePreview();
            }

            event.target.value = '';  // 清空输入
        }

        // 显示文件预览
        function showFilePreview(fileName, isLoading = false) {
            const preview = document.getElementById('filePreview');
            const fileNameText = document.getElementById('fileNameText');

            fileNameText.textContent = fileName;
            preview.classList.add('active');

            if (isLoading) {
                preview.style.background = '#fff3e0';
                preview.style.borderColor = '#ff9800';
            } else {
                preview.style.background = '#e8f5e9';
                preview.style.borderColor = '#4caf50';
            }
        }

        // 隐藏文件预览
        function hideFilePreview() {
            const preview = document.getElementById('filePreview');
            preview.classList.remove('active');
        }

        // 移除文件
        function removeFile() {
            currentFilePath = null;
            currentFileName = null;
            hideFilePreview();
            addSystemMessage('已移除文件');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();

            if (!message || isStreaming) return;

            input.value = '';
            isStreaming = true;
            document.getElementById('sendBtn').disabled = true;

            // 添加用户消息
            addMessage('user', message);
            messages.push({ role: 'user', content: message });

            // 添加加载指示器
            const typingDiv = addTypingIndicator();

            try {
                // 构建请求数据
                const requestData = {
                    messages: messages,
                    mode: currentMode,
                    session_id: sessionId
                };

                // 如果有上传的文件，添加文件路径
                if (currentFilePath) {
                    requestData.file_path = currentFilePath;
                }

                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                // 移除加载指示器，创建消息容器
                typingDiv.remove();
                const assistantDiv = addMessage('assistant', '');
                const contentDiv = assistantDiv.querySelector('.message-content');

                let fullContent = '';
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const text = decoder.decode(value);
                    const lines = text.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.content) {
                                    fullContent += data.content;
                                    contentDiv.innerHTML = marked.parse(fullContent);

                                    // 代码高亮
                                    contentDiv.querySelectorAll('pre code').forEach(block => {
                                        hljs.highlightElement(block);
                                    });

                                    scrollToBottom();
                                }
                            } catch (e) { }
                        }
                    }
                }

                messages.push({ role: 'assistant', content: fullContent });

                // 发送成功后清除文件（如果需要保留文件供下次使用，可以注释下面两行）
                if (currentFilePath) {
                    removeFile();  // 发送后自动清除文件
                }

            } catch (error) {
                typingDiv.remove();
                addMessage('assistant', `**错误**: ${error.message}`);
            }

            isStreaming = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        function exportChat() {
            if (messages.length === 0) {
                alert('没有可导出的对话记录');
                return;
            }

            let content = '# AI对话记录\n\n';
            content += `导出时间: ${new Date().toLocaleString()}

---

`;

            messages.forEach(msg => {
                const role = msg.role === 'user' ? '👤 用户' : '🤖 助手';
                content += `### ${role}

${msg.content}

---

`;
            });

            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat_${new Date().toISOString().slice(0, 10)}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }

        async function showHistory() {
            try {
                const response = await fetch('/chat/history');
                const data = await response.json();

                if (data.sessions && data.sessions.length > 0) {
                    // 创建历史记录弹窗
                    const modal = createHistoryModal(data.sessions);
                    document.body.appendChild(modal);
                } else {
                    alert('暂无历史记录');
                }
            } catch (error) {
                alert('获取历史记录失败: ' + error.message);
            }
        }

        function createHistoryModal(sessions) {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;';

            let sessionList = '';
            sessions.forEach((session, index) => {
                const time = new Date(session.timestamp).toLocaleString();
                const modeText = session.mode === 'chat' ? '聊天' : (session.mode === 'agent' ? '智能体' : '多智能体');
                const preview = session.preview || '无预览';
                sessionList += `
                    <div style="padding:15px 60px 15px 15px;border-bottom:1px solid #eee;position:relative;" 
                         onmouseover="this.style.background='#f5f5f5'" 
                         onmouseout="this.style.background='#fff'">
                        <div onclick="loadHistorySession('${session.session_id}')" style="cursor:pointer;">
                            <div style="display:flex;justify-content:space-between;margin-bottom:5px;padding-right:10px;">
                                <span style="font-weight:600;color:#333;">${time}</span>
                                <span style="color:#667eea;font-size:12px;">${modeText}模式</span>
                            </div>
                            <div style="color:#888;font-size:13px;max-width:calc(100% - 60px);word-break:break-word;">${preview}</div>
                            <div style="color:#aaa;font-size:12px;margin-top:5px;">消息数: ${session.message_count}</div>
                        </div>
                        <button onclick="event.stopPropagation();deleteHistorySession('${session.session_id}')" 
                                style="position:absolute;top:50%;right:15px;transform:translateY(-50%);border:none;background:#ff4444;color:#fff;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:background 0.2s;white-space:nowrap;"
                                onmouseover="this.style.background='#ff0000'"
                                onmouseout="this.style.background='#ff4444'">删除</button>
                    </div>
                `;
            });

            modal.innerHTML = `
                <div style="background:#fff;border-radius:12px;width:600px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;">
                    <div style="padding:20px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;">
                        <h2 style="margin:0;font-size:18px;color:#333;">历史记录</h2>
                        <button onclick="this.closest('div').parentElement.parentElement.remove()" 
                                style="border:none;background:transparent;font-size:24px;cursor:pointer;color:#888;">&times;</button>
                    </div>
                    <div style="overflow-y:auto;flex:1;">
                        ${sessionList}
                    </div>
                </div>
            `;

            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };

            return modal;
        }

        async function loadHistorySession(session_id) {
            try {
                const response = await fetch(`/chat/history/${session_id}`);
                const data = await response.json();

                if (data.success) {
                    // 关闭历史记录弹窗
                    document.querySelectorAll('div[style*="z-index:1000"]').forEach(el => el.remove());

                    // 清空当前对话
                    messages = [];
                    document.getElementById('messagesList').innerHTML = '';
                    document.getElementById('welcomeSection').style.display = 'none';

                    // 添加系统提示：正在加载历史对话
                    const list = document.getElementById('messagesList');
                    const loadInfoDiv = document.createElement('div');
                    loadInfoDiv.className = 'message assistant';
                    const modeText = data.session.mode === 'chat' ? '聊天' : (data.session.mode === 'agent' ? '智能体' : '多智能体');
                    const loadTime = new Date(data.session.timestamp).toLocaleString();
                    loadInfoDiv.innerHTML = `
                        <div class="message-avatar">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        </div>
                        <div class="message-content" style="background:#e3f2fd;border:1px solid #2196f3;">
                            <strong>📋 已加载历史对话</strong><br>
                            对话时间：${loadTime}<br>
                            对话模式：${modeText}模式<br>
                            消息数量：${data.session.messages.length} 条<br><br>
                            <em style="color:#666;">以下是历史对话记录：</em>
                        </div>
                    `;
                    list.appendChild(loadInfoDiv);

                    // 加载历史消息
                    data.session.messages.forEach(msg => {
                        addMessage(msg.role, msg.content);
                        messages.push(msg);
                    });

                    // 切换模式
                    currentMode = data.session.mode;
                    document.querySelectorAll('.mode-tab').forEach((tab, index) => {
                        const modes = ['chat', 'agent'];
                        if (modes[index] === currentMode) {
                            tab.classList.add('active');
                        } else {
                            tab.classList.remove('active');
                        }
                    });

                    sessionId = session_id;
                    scrollToBottom();
                }
            } catch (error) {
                alert('加载历史记录失败: ' + error.message);
            }
        }

        async function deleteHistorySession(session_id) {
            if (!confirm('确定要删除这条历史记录吗？')) {
                return;
            }

            try {
                const response = await fetch(`/chat/history/${session_id}`, {
                    method: 'DELETE'
                });
                const data = await response.json();

                if (data.success) {
                    // 关闭当前弹窗
                    document.querySelectorAll('div[style*="z-index:1000"]').forEach(el => el.remove());
                    // 重新打开历史记录（刷新列表）
                    setTimeout(() => showHistory(), 100);
                    addSystemMessage('历史记录已删除');
                } else {
                    alert('删除失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('删除历史记录失败: ' + error.message);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userInput').focus();

            // 默认是聊天模式，隐藏上传按钮（只在智能体模式显示）
            const uploadButtons = document.querySelectorAll('.upload-btn');
            uploadButtons.forEach(btn => {
                btn.style.display = 'none';
            });
        });
    </script>

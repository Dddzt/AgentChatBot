<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能对话机器人</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs.min.css">
    <style>
        :root {
            --bg: #eef2f9;
            --surface: rgba(255, 255, 255, 0.82);
            --surface-strong: #ffffff;
            --surface-muted: #f7f8fc;
            --text: #1f2433;
            --text-soft: #6c7387;
            --border: #e7eaf2;
            --brand: #5b63f3;
            --brand-strong: #3139bf;
            --accent: #ff8a5c;
            --success: #2d9d63;
            --danger: #ea4b4b;
            --sidebar: #181b27;
            --sidebar-soft: #24293a;
            --shadow: 0 24px 60px rgba(31, 36, 51, 0.12);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, #f9fbff 0, #eef2ff 34%, #edf1f8 100%);
            min-height: 100vh;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(135deg, rgba(91, 99, 243, 0.08), transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(255, 138, 92, 0.14), transparent 22%);
        }

        button, label { font: inherit; }

        .sidebar {
            width: 86px;
            padding: 22px 16px;
            background: linear-gradient(180deg, var(--sidebar) 0%, #1f2332 100%);
            box-shadow: 24px 0 60px rgba(15, 20, 33, 0.18);
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }

        .sidebar-logo,
        .message-avatar {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-logo {
            width: 52px;
            height: 52px;
            margin-bottom: 36px;
            border-radius: 16px;
            background: linear-gradient(135deg, #2f3550, #1b2031);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .sidebar-logo svg { width: 28px; height: 28px; fill: #fff; }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .nav-item {
            width: 54px;
            height: 54px;
            border: 1px solid transparent;
            border-radius: 18px;
            background: transparent;
            color: #98a0b4;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform .2s, background .2s, border-color .2s, color .2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            color: #fff;
            transform: translateY(-1px);
        }

        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }
        .nav-item span { font-size: 11px; }

        .main-content {
            flex: 1;
            min-width: 0;
            margin: 0;
            height: 100vh;
            border-radius: 0;
            border-left: 1px solid rgba(255, 255, 255, 0.72);
            background: var(--surface);
            backdrop-filter: blur(22px);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .header {
            height: 84px;
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.76));
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .new-chat-btn,
        .mode-tab,
        .send-btn,
        .remove-file-btn,
        .history-action-btn {
            cursor: pointer;
        }

        .new-chat-btn {
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, #1f2333, #2d3148);
            color: #fff;
            padding: 14px 22px;
            font-size: 14px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 16px 28px rgba(31, 35, 51, 0.22);
            transition: transform .2s, box-shadow .2s;
        }

        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 30px rgba(31, 35, 51, 0.24);
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--surface-muted);
        }

        .mode-tab {
            border: 0;
            border-radius: 12px;
            background: transparent;
            color: var(--text-soft);
            padding: 10px 16px;
            min-width: 112px;
            font-size: 13px;
            font-weight: 600;
            transition: background .2s, color .2s, box-shadow .2s;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, var(--brand), #727dff);
            color: #fff;
            box-shadow: 0 14px 24px rgba(91, 99, 243, 0.28);
        }

        .app-view {
            flex: 1;
            min-height: 0;
            display: none;
        }

        .app-view.active {
            display: flex;
            animation: fade-in .25s ease;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-view { flex-direction: column; }

        .chat-container {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 32px 32px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .welcome-section {
            flex: 1;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-soft);
            padding: 30px;
        }

        .welcome-icon {
            width: 88px;
            height: 88px;
            margin-bottom: 22px;
            border-radius: 24px;
            background: linear-gradient(135deg, #1e2436, #31395f);
            box-shadow: 0 20px 42px rgba(30, 36, 54, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-icon svg,
        .sidebar-logo svg,
        .nav-item svg,
        .send-btn svg {
            display: block;
        }

        .welcome-icon svg { width: 46px; height: 46px; fill: #fff; }

        .welcome-title {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: .02em;
            margin-bottom: 10px;
            color: var(--text);
        }

        .welcome-desc {
            max-width: 520px;
            line-height: 1.8;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .message {
            max-width: min(880px, 88%);
            display: flex;
            gap: 14px;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #5d66f4, #7d87ff);
            box-shadow: 0 14px 26px rgba(91, 99, 243, 0.22);
        }

        .message.assistant .message-avatar {
            background: linear-gradient(135deg, #202538, #313654);
        }

        .message-avatar svg { width: 20px; height: 20px; fill: #fff; }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.7;
            word-break: break-word;
        }

        .message.user .message-content {
            color: #fff;
            background: linear-gradient(135deg, #5d66f4, #717cff);
            box-shadow: 0 14px 28px rgba(91, 99, 243, 0.18);
        }

        .message.assistant .message-content {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(224, 227, 238, 0.9);
            box-shadow: 0 10px 30px rgba(50, 59, 82, 0.08);
        }

        .message-content h1,
        .message-content h2,
        .message-content h3 { margin: 12px 0 8px; }

        .message-content ul,
        .message-content ol { margin: 10px 0; padding-left: 20px; }

        .message-content blockquote {
            margin: 10px 0;
            padding-left: 14px;
            border-left: 3px solid var(--brand);
            color: var(--text-soft);
        }

        .message-content pre {
            margin: 10px 0;
            padding: 14px;
            overflow-x: auto;
            border: 1px solid #dfe4f0;
            border-radius: 14px;
            background: #f7f9fe;
        }

        .message-content code {
            font-family: Consolas, "Courier New", monospace;
            font-size: 14px;
        }

        .message-content p code {
            background: #f1f3fb;
            color: #c23a6b;
            padding: 2px 6px;
            border-radius: 6px;
        }

        .input-section {
            border-top: 1px solid var(--border);
            padding: 14px 24px 18px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(248, 249, 253, 0.96));
        }

        .composer-shell {
            position: relative;
        }

        .file-preview {
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            padding: 12px 14px;
            border: 1px solid #8ed9af;
            border-radius: 16px;
            background: #effbf4;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
            font-size: 13px;
        }

        .file-preview.active { display: flex; }

        .file-info-text {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--success);
        }

        .file-info-text span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .remove-file-btn {
            border: 0;
            background: transparent;
            width: 30px;
            height: 30px;
            border-radius: 10px;
            color: var(--text-soft);
            font-size: 18px;
            transition: background .2s, color .2s;
        }

        .remove-file-btn:hover {
            background: #ffe4e4;
            color: #d23333;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid rgba(223, 226, 236, 0.9);
            border-radius: 26px;
            background: rgba(245, 247, 252, 0.88);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.74);
            position: relative;
        }

        .tool-menu-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .tool-trigger {
            width: 42px;
            height: 42px;
            border: 1px solid #dde2ee;
            border-radius: 14px;
            background: #fff;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 24px rgba(30, 37, 56, 0.08);
            transition: transform .2s, border-color .2s, box-shadow .2s;
        }

        .tool-trigger:hover,
        .tool-trigger.active {
            border-color: rgba(91, 99, 243, 0.28);
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(31, 36, 51, 0.12);
        }

        .tool-trigger.active svg {
            transform: rotate(45deg);
        }

        .tool-trigger svg {
            width: 18px;
            height: 18px;
            transition: transform .2s;
        }

        .tool-menu {
            position: absolute;
            left: 0;
            bottom: calc(100% + 12px);
            width: 256px;
            padding: 10px;
            border: 1px solid #e4e8f2;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 22px 40px rgba(31, 36, 51, 0.14);
            backdrop-filter: blur(18px);
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
        }

        .tool-menu.open { display: flex; }

        .tool-menu-item {
            position: relative;
            width: 100%;
            padding: 12px 14px;
            border: 0;
            border-radius: 16px;
            background: #f8faff;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
            transition: transform .2s, background .2s;
        }

        .tool-menu-item:hover {
            transform: translateY(-1px);
            background: #eef3ff;
        }

        .tool-menu-item.hidden { display: none; }

        .tool-menu-item input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .tool-menu-icon {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(91, 99, 243, 0.16), rgba(91, 99, 243, 0.04));
            color: var(--brand);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-menu-item.export-item .tool-menu-icon {
            background: linear-gradient(135deg, rgba(255, 138, 92, 0.18), rgba(255, 138, 92, 0.08));
            color: var(--accent);
        }

        .tool-menu-copy {
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }

        .tool-menu-copy strong {
            font-size: 14px;
            font-weight: 700;
        }

        .tool-menu-copy small {
            font-size: 12px;
            color: var(--text-soft);
            line-height: 1.35;
            white-space: normal;
        }

        .input-wrapper textarea {
            flex: 1;
            min-height: 28px;
            max-height: 150px;
            border: 0;
            outline: 0;
            resize: none;
            background: transparent;
            color: var(--text);
            font: inherit;
            line-height: 1.6;
            padding: 8px 0;
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border: 0;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--brand), #7984ff);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 16px 30px rgba(91, 99, 243, 0.28);
            transition: transform .2s, box-shadow .2s;
        }

        .send-btn svg { width: 22px; height: 22px; }

        .send-btn:hover {
            transform: translateY(-1px) scale(1.02);
            box-shadow: 0 18px 34px rgba(91, 99, 243, 0.32);
        }

        .send-btn:disabled {
            background: #d7dcef;
            color: #fff;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .input-meta {
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .mode-hint,
        .input-note {
            font-size: 12px;
            color: var(--text-soft);
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #8c94aa;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; }

        @keyframes typing {
            0%, 100% { opacity: .3; transform: scale(.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        .history-view {
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        .history-list-card {
            width: 100%;
            padding: 24px 28px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 18px 38px rgba(31, 36, 51, 0.08);
        }

        .history-list-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .panel-kicker {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(91, 99, 243, 0.12);
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .08em;
        }

        .history-list-head h2 {
            margin-top: 10px;
            font-size: 26px;
        }

        .history-list-tools {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .history-action-btn {
            border: 1px solid transparent;
            border-radius: 16px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 700;
            transition: transform .2s, box-shadow .2s, background .2s, border-color .2s;
        }

        .history-action-btn.secondary {
            color: var(--text);
            background: rgba(255, 255, 255, 0.88);
            border-color: var(--border);
        }

        .history-action-btn:hover { transform: translateY(-1px); }

        .history-status {
            color: var(--text-soft);
            font-size: 13px;
        }

        .history-session-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .history-item {
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 22px;
            background: linear-gradient(180deg, #fff, #fafbff);
            transition: transform .2s, border-color .2s, box-shadow .2s;
        }

        .history-item:hover {
            transform: translateY(-2px);
            border-color: rgba(91, 99, 243, 0.28);
            box-shadow: 0 16px 32px rgba(31, 36, 51, 0.1);
        }

        .history-item.current {
            border-color: rgba(91, 99, 243, 0.42);
            box-shadow: 0 18px 34px rgba(91, 99, 243, 0.12);
        }

        .history-item-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .history-item-main {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-item-time {
            font-size: 18px;
            font-weight: 700;
        }

        .history-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            background: #eef1ff;
            color: var(--brand);
            font-size: 12px;
            font-weight: 700;
        }

        .history-pill.current {
            background: rgba(255, 138, 92, 0.12);
            color: #c86539;
        }

        .history-count {
            font-size: 13px;
            color: var(--text-soft);
            white-space: nowrap;
        }

        .history-preview {
            color: var(--text-soft);
            line-height: 1.75;
            margin-bottom: 16px;
            word-break: break-word;
        }

        .history-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .history-btn {
            border: 1px solid transparent;
            border-radius: 14px;
            padding: 11px 16px;
            font-size: 14px;
            font-weight: 700;
            transition: transform .2s, background .2s, border-color .2s;
        }

        .history-btn:hover { transform: translateY(-1px); }

        .history-btn.primary {
            background: linear-gradient(135deg, var(--brand), #7b83ff);
            color: #fff;
            box-shadow: 0 12px 24px rgba(91, 99, 243, 0.22);
        }

        .history-btn.secondary {
            background: #fff;
            color: var(--text);
            border-color: var(--border);
        }

        .history-btn.danger {
            background: #fff1f1;
            color: var(--danger);
            border-color: #ffd6d6;
        }

        .history-empty,
        .history-error,
        .history-loading {
            padding: 28px;
            border: 1px dashed var(--border);
            border-radius: 20px;
            background: rgba(248, 249, 253, 0.85);
            text-align: center;
            color: var(--text-soft);
        }

        .history-empty h3,
        .history-error h3 {
            color: var(--text);
            margin-bottom: 8px;
        }

        .history-loading-grid {
            display: grid;
            gap: 12px;
        }

        .history-skeleton {
            height: 126px;
            border-radius: 20px;
            background: linear-gradient(90deg, #f3f5fa 20%, #ebeff8 40%, #f3f5fa 60%);
            background-size: 200% 100%;
            animation: shimmer 1.2s linear infinite;
        }

        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                overflow: auto;
            }

            body::before {
                position: absolute;
                min-height: 100%;
            }

            .sidebar {
                width: 100%;
                padding: 16px;
                flex-direction: row;
                justify-content: space-between;
                box-shadow: none;
            }

            .sidebar-logo { margin-bottom: 0; }
            .sidebar-nav { flex-direction: row; }

            .main-content {
                margin: 0;
                border-radius: 0;
                min-height: calc(100vh - 84px);
            }

            .header {
                height: auto;
                padding: 16px;
                flex-direction: column;
                align-items: stretch;
            }

            .mode-tabs { width: 100%; }
            .mode-tab { flex: 1; min-width: 0; }

            .chat-container,
            .history-view { padding: 20px 16px; }

            .input-section { padding: 14px 16px 16px; }
            .message { max-width: 100%; }

            .input-meta,
            .history-list-head,
            .history-list-tools,
            .history-item-top {
                flex-direction: column;
                align-items: stretch;
            }

            .tool-menu {
                width: min(260px, calc(100vw - 48px));
            }

            .history-list-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item active" id="chatNavBtn" data-section="chat" onclick="switchSection('chat', this)">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
                <span>对话</span>
            </button>
            <button class="nav-item" id="historyNavBtn" data-section="history" onclick="switchSection('history', this)">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                <span>历史</span>
            </button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <button class="new-chat-btn" onclick="newChat()">
                <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                新对话
            </button>
            <div class="mode-tabs">
                <button class="mode-tab active" onclick="switchMode('chat', this)">聊天模式</button>
                <button class="mode-tab" onclick="switchMode('agent', this)">智能体模式</button>
            </div>
        </header>

        <section class="app-view chat-view active" id="chatView" data-view="chat">
            <div class="chat-container" id="chatContainer">
                <div class="welcome-section" id="welcomeSection">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </div>
                    <h1 class="welcome-title">小D智能助手</h1>
                    <p class="welcome-desc">可以帮你完成各种任务，包括写作、分析、编程，以及结合图片和文件内容继续追问。</p>
                </div>
                <div class="messages-list" id="messagesList"></div>
            </div>

            <section class="input-section">
                <div class="composer-shell">
                    <div class="file-preview" id="filePreview">
                        <div class="file-info-text">
                            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15.01l1.41 1.41L11 14.84V19h2v-4.16l1.59 1.59L16 15.01 12.01 11z"/></svg>
                            <span id="fileNameText">已选择文件</span>
                        </div>
                        <button class="remove-file-btn" type="button" onclick="removeFile()">×</button>
                    </div>

                    <div class="input-wrapper">
                        <div class="tool-menu-wrap">
                            <button class="tool-trigger" id="toolMenuBtn" type="button" aria-label="打开工具菜单" aria-expanded="false" onclick="toggleToolMenu(event)">
                                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 11H13V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
                            </button>
                            <div class="tool-menu" id="toolMenu">
                                <label class="tool-menu-item upload-menu-item" id="imageToolItem" title="上传图片">
                                    <span class="tool-menu-icon">
                                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                                    </span>
                                    <span class="tool-menu-copy">
                                        <strong>图片</strong>
                                        <small>上传截图、照片或界面图</small>
                                    </span>
                                    <input type="file" accept="image/*" onchange="handleImageUpload(event)">
                                </label>
                                <label class="tool-menu-item upload-menu-item" id="fileToolItem" title="上传文件">
                                    <span class="tool-menu-icon">
                                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
                                    </span>
                                    <span class="tool-menu-copy">
                                        <strong>文件</strong>
                                        <small>支持文档、音视频等内容</small>
                                    </span>
                                    <input type="file" accept=".txt,.md,.pdf,.doc,.docx,.mp3,.wav,.mp4,.avi,.mov,.mkv" onchange="handleFileUpload(event)">
                                </label>
                                <button class="tool-menu-item export-item" type="button" onclick="exportChat(); closeToolMenu();">
                                    <span class="tool-menu-icon">
                                        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
                                    </span>
                                    <span class="tool-menu-copy">
                                        <strong>导出聊天记录</strong>
                                        <small>将当前会话导出为 Markdown</small>
                                    </span>
                                </button>
                            </div>
                        </div>

                        <textarea id="userInput" rows="1" placeholder="请输入消息（Shift+Enter换行，Enter发送）" onkeydown="handleKeyDown(event)" oninput="autoResizeTextarea(this)"></textarea>
                        <button class="send-btn" id="sendBtn" type="button" onclick="sendMessage()">
                            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>

                    <div class="input-meta">
                        <span class="mode-hint" id="modeHint">聊天模式下可直接对话；切换到智能体模式后支持图片和文件解析。</span>
                        <span class="input-note">支持 Shift + Enter 换行，Enter 发送</span>
                    </div>
                </div>
            </section>
        </section>

        <section class="app-view history-view" id="historyView" data-view="history">
            <div class="history-list-card">
                <div class="history-list-head">
                    <div>
                        <span class="panel-kicker">历史对话</span>
                        <h2>会话列表</h2>
                    </div>
                    <div class="history-list-tools">
                        <span class="history-status" id="historyStatus">最近 7 天自动保存</span>
                        <button class="history-action-btn secondary" type="button" onclick="showHistory()">刷新</button>
                    </div>
                </div>
                <div class="history-session-list" id="historySessionList"></div>
            </div>
        </section>
    </main>
    <script>
        let currentMode = "chat";
        let currentSection = "chat";
        let messages = [];
        let isStreaming = false;
        let isToolMenuOpen = false;
        let sessionId = id();
        let currentFilePath = null;
        let historySessions = [];

        const MODE_LABELS = { chat: "聊天模式", agent: "智能体模式" };
        const FILE_TYPE_ICONS = { document: "📄", audio: "🎵", video: "🎬", image: "🖼️" };
        const MAX_UPLOAD_SIZE = 50 * 1024 * 1024;

        const safeRenderer = new marked.Renderer();
        safeRenderer.html = (html) => esc(html);
        marked.setOptions({ breaks: true, gfm: true, renderer: safeRenderer });

        function id() {
            return `session_${Date.now()}_${Math.random().toString(36).slice(2, 11)}`;
        }

        function esc(text) {
            const div = document.createElement("div");
            div.textContent = text ?? "";
            return div.innerHTML;
        }

        function formatDate(value) {
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? "未知时间" : date.toLocaleString();
        }

        function formatNumber(value) {
            return new Intl.NumberFormat("zh-CN").format(Number(value) || 0);
        }

        function formatMode(mode) {
            return MODE_LABELS[mode] || "未知模式";
        }

        function getNavButton(section) {
            return document.querySelector(`.nav-item[data-section="${section}"]`);
        }

        function scrollBottom() {
            const el = document.getElementById("chatContainer");
            el.scrollTop = el.scrollHeight;
        }

        function setActiveNav(button) {
            document.querySelectorAll(".nav-item").forEach((el) => el.classList.remove("active"));
            (button || getNavButton(currentSection))?.classList.add("active");
        }

        function setSection(section) {
            currentSection = section;
            document.querySelectorAll(".app-view").forEach((el) => {
                el.classList.toggle("active", el.dataset.view === section);
            });
        }

        function switchSection(section, button) {
            if (!["chat", "history"].includes(section)) return;
            closeToolMenu();
            setSection(section);
            setActiveNav(button || getNavButton(section));
            if (section === "history") {
                showHistory();
                return;
            }
            document.getElementById("userInput").focus();
        }

        function updateUploads() {
            const imageToolItem = document.getElementById("imageToolItem");
            const fileToolItem = document.getElementById("fileToolItem");
            const modeHint = document.getElementById("modeHint");
            const showUploadTools = currentMode === "agent";
            imageToolItem.classList.toggle("hidden", !showUploadTools);
            fileToolItem.classList.toggle("hidden", !showUploadTools);
            modeHint.textContent = currentMode === "agent"
                ? "智能体模式已开启，可上传图片和文件作为上下文。"
                : "聊天模式下可直接对话；切换到智能体模式后支持图片和文件解析。";
        }

        function setToolMenuOpen(open) {
            isToolMenuOpen = open;
            document.getElementById("toolMenu").classList.toggle("open", open);
            const button = document.getElementById("toolMenuBtn");
            button.classList.toggle("active", open);
            button.setAttribute("aria-expanded", String(open));
        }

        function toggleToolMenu(event) {
            event?.stopPropagation();
            setToolMenuOpen(!isToolMenuOpen);
        }

        function closeToolMenu() {
            if (!isToolMenuOpen) return;
            setToolMenuOpen(false);
        }

        function resetInput() {
            const input = document.getElementById("userInput");
            input.value = "";
            autoResizeTextarea(input);
        }

        function resetConversation(showWelcome = true) {
            messages = [];
            sessionId = id();
            document.getElementById("messagesList").innerHTML = "";
            document.getElementById("welcomeSection").style.display = showWelcome ? "flex" : "none";
            closeToolMenu();
            removeFile(false);
            resetInput();
        }

        function switchMode(mode, button) {
            if (!MODE_LABELS[mode]) return;
            currentMode = mode;
            document.querySelectorAll(".mode-tab").forEach((el) => el.classList.remove("active"));
            if (button) button.classList.add("active");
            updateUploads();
            if (currentFilePath) removeFile(false);
            addSystemMessage(`已切换到${MODE_LABELS[mode]}`);
        }

        function newChat() {
            switchSection("chat", getNavButton("chat"));
            resetConversation(true);
            addSystemMessage("已开始新对话");
            document.getElementById("userInput").focus();
        }

        function addSystemMessage(text) {
            const note = document.createElement("div");
            note.style.cssText = "text-align:center;color:#7f879b;font-size:12px;padding:4px 10px;";
            note.textContent = text;
            document.getElementById("chatContainer").appendChild(note);
            scrollBottom();
            setTimeout(() => note.remove(), 3000);
        }

        function renderMarkdown(container, content) {
            container.style.whiteSpace = "";
            container.innerHTML = content ? marked.parse(content) : "";
            container.querySelectorAll("pre code").forEach((block) => hljs.highlightElement(block));
        }

        function renderStreamingText(container, content) {
            container.style.whiteSpace = "pre-wrap";
            container.textContent = content || "";
        }

        function addMessage(role, content) {
            document.getElementById("welcomeSection").style.display = "none";
            const wrap = document.createElement("div");
            wrap.className = `message ${role}`;
            wrap.innerHTML = role === "user"
                ? '<div class="message-avatar"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div><div class="message-content"></div>'
                : '<div class="message-avatar"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div><div class="message-content"></div>';
            const contentEl = wrap.querySelector(".message-content");
            if (role === "assistant") {
                renderMarkdown(contentEl, content);
            } else {
                contentEl.textContent = content;
            }
            document.getElementById("messagesList").appendChild(wrap);
            scrollBottom();
            return wrap;
        }

        function addTypingIndicator() {
            const wrap = document.createElement("div");
            wrap.className = "message assistant";
            wrap.innerHTML = '<div class="message-avatar"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div><div class="message-content"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
            document.getElementById("welcomeSection").style.display = "none";
            document.getElementById("messagesList").appendChild(wrap);
            scrollBottom();
            return wrap;
        }

        function handleKeyDown(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function autoResizeTextarea(textarea) {
            textarea.style.height = "auto";
            textarea.style.height = `${Math.min(textarea.scrollHeight, 150)}px`;
        }

        async function parseJson(response) {
            const text = await response.text();
            try {
                return JSON.parse(text);
            } catch {
                return { success: response.ok, error: text || `请求失败，状态码 ${response.status}` };
            }
        }

        async function uploadAsset(file, endpoint) {
            const body = new FormData();
            body.append("file", file);
            const response = await fetch(endpoint, { method: "POST", body });
            const result = await parseJson(response);
            if (!response.ok || !result.success) throw new Error(result.error || "上传失败");
            return result;
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            closeToolMenu();
            if (!file.type.startsWith("image/")) return alert("请选择图片文件");
            if (file.size > MAX_UPLOAD_SIZE) return alert("文件大小不能超过 50MB");

            showFilePreview("上传中...", true);
            try {
                const result = await uploadAsset(file, "/upload/image");
                currentFilePath = result.file_path;
                showFilePreview(`🖼️ ${result.file_name}`);
            } catch (error) {
                hideFilePreview();
                alert(`图片上传失败: ${error.message}`);
            } finally {
                event.target.value = "";
                document.getElementById("userInput").focus();
            }
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            closeToolMenu();
            if (file.size > MAX_UPLOAD_SIZE) return alert("文件大小不能超过 50MB");

            showFilePreview("上传中...", true);
            try {
                const result = await uploadAsset(file, "/upload/file");
                currentFilePath = result.file_path;
                showFilePreview(`${FILE_TYPE_ICONS[result.file_type] || "📁"} ${result.file_name}`);
            } catch (error) {
                hideFilePreview();
                alert(`文件上传失败: ${error.message}`);
            } finally {
                event.target.value = "";
                document.getElementById("userInput").focus();
            }
        }

        function showFilePreview(name, loading = false) {
            const preview = document.getElementById("filePreview");
            document.getElementById("fileNameText").textContent = name;
            preview.classList.add("active");
            preview.style.background = loading ? "#fff4e5" : "#effbf4";
            preview.style.borderColor = loading ? "#ffb55c" : "#8ed9af";
        }

        function hideFilePreview() {
            document.getElementById("filePreview").classList.remove("active");
        }

        function removeFile(showNotice = true) {
            currentFilePath = null;
            hideFilePreview();
            if (showNotice) addSystemMessage("已移除文件");
        }

        async function readError(response) {
            const data = await parseJson(response);
            return data.error || data.message || `请求失败，状态码 ${response.status}`;
        }

        function processSseLine(line, onData) {
            const raw = line.trim();
            if (!raw.startsWith("data: ")) return;
            try {
                onData(JSON.parse(raw.slice(6)));
            } catch (error) {
                console.warn("Failed to parse SSE payload", error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const sendButton = document.getElementById("sendBtn");
            const message = input.value.trim();
            if (!message || isStreaming) return;

            closeToolMenu();
            switchSection("chat", getNavButton("chat"));
            resetInput();
            isStreaming = true;
            sendButton.disabled = true;
            addMessage("user", message);
            messages.push({ role: "user", content: message });

            const typing = addTypingIndicator();
            try {
                const body = { messages, mode: currentMode, session_id: sessionId };
                if (currentFilePath) body.file_path = currentFilePath;

                const response = await fetch("/chat/stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                if (!response.ok) throw new Error(await readError(response));
                if (!response.body) throw new Error("服务端没有返回流式数据");

                if (typing.isConnected) typing.remove();

                const assistant = addMessage("assistant", "");
                const contentEl = assistant.querySelector(".message-content");
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let full = "";
                let buffer = "";
                let doneFlag = false;
                let latestStatus = "";
                let renderPending = false;

                const flushRender = (forceMarkdown = false) => {
                    renderPending = false;
                    if (full) {
                        if (forceMarkdown || doneFlag) {
                            renderMarkdown(contentEl, full);
                        } else {
                            renderStreamingText(contentEl, full);
                        }
                    } else if (latestStatus) {
                        renderStreamingText(contentEl, latestStatus);
                    }
                    scrollBottom();
                };

                const scheduleRender = (forceMarkdown = false) => {
                    if (forceMarkdown) {
                        flushRender(true);
                        return;
                    }
                    if (renderPending) return;
                    renderPending = true;
                    requestAnimationFrame(() => flushRender(false));
                };

                const apply = (payload) => {
                    const eventType = payload.type || "content";
                    if (eventType === "status") {
                        latestStatus = payload.content || latestStatus;
                        if (!full) scheduleRender(false);
                    } else if (payload.content) {
                        full += payload.content;
                        scheduleRender(false);
                    }
                    if (payload.done) {
                        doneFlag = true;
                        scheduleRender(true);
                    }
                };

                while (!doneFlag) {
                    const { done, value } = await reader.read();
                    buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
                    const lines = buffer.split("\n");
                    buffer = lines.pop() || "";
                    lines.forEach((line) => processSseLine(line, apply));
                    if (done) {
                        processSseLine(buffer, apply);
                        break;
                    }
                }

                if (full) {
                    renderMarkdown(contentEl, full);
                } else if (latestStatus) {
                    renderStreamingText(contentEl, latestStatus);
                }

                if (full) messages.push({ role: "assistant", content: full });
                if (currentFilePath) removeFile(false);
            } catch (error) {
                if (typing.isConnected) typing.remove();
                const errorMessage = `**错误**: ${error.message}`;
                addMessage("assistant", errorMessage);
                messages.push({ role: "assistant", content: errorMessage });
            } finally {
                isStreaming = false;
                sendButton.disabled = false;
                input.focus();
            }
        }

        function exportChat() {
            if (messages.length === 0) return alert("没有可导出的对话记录");
            let content = `# AI对话记录\n\n导出时间: ${new Date().toLocaleString()}\n\n---\n\n`;
            messages.forEach((message) => {
                content += `## ${message.role === "user" ? "用户" : "助手"}\n\n${message.content}\n\n---\n\n`;
            });
            const blob = new Blob([content], { type: "text/markdown" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `chat_${new Date().toISOString().slice(0, 10)}.md`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function createHistoryLoadingMarkup() {
            return `
                <div class="history-loading">
                    <div class="history-loading-grid">
                        <div class="history-skeleton"></div>
                        <div class="history-skeleton"></div>
                        <div class="history-skeleton"></div>
                    </div>
                </div>
            `;
        }

        function createHistoryEmptyMarkup() {
            return `
                <div class="history-empty">
                    <h3>还没有历史记录</h3>
                    <p>发送第一条消息后，这里会自动出现会话卡片。</p>
                </div>
            `;
        }

        function createHistoryErrorMarkup(message) {
            return `
                <div class="history-error">
                    <h3>历史记录加载失败</h3>
                    <p>${esc(message)}</p>
                </div>
            `;
        }

        function createHistoryRow(session) {
            const item = document.createElement("article");
            const isCurrent = session.session_id === sessionId;
            item.className = `history-item${isCurrent ? " current" : ""}`;
            item.innerHTML = `
                <div class="history-item-top">
                    <div class="history-item-main">
                        <span class="history-item-time">${esc(formatDate(session.timestamp))}</span>
                        <span class="history-pill">${esc(formatMode(session.mode))}</span>
                        ${isCurrent ? '<span class="history-pill current">当前会话</span>' : ""}
                    </div>
                    <span class="history-count">${formatNumber(session.message_count || 0)} 条消息</span>
                </div>
                <p class="history-preview">${esc(session.preview || "暂无预览内容")}</p>
                <div class="history-actions">
                    <button class="history-btn primary" type="button" data-action="open">继续对话</button>
                    <button class="history-btn danger" type="button" data-action="delete">删除</button>
                </div>
            `;

            item.querySelector('[data-action="open"]').onclick = () => loadHistorySession(session.session_id);
            item.querySelector('[data-action="delete"]').onclick = () => deleteHistorySession(session.session_id);
            return item;
        }

        function renderHistorySessions(sessions) {
            const list = document.getElementById("historySessionList");
            if (!sessions.length) {
                list.innerHTML = createHistoryEmptyMarkup();
                return;
            }

            list.innerHTML = "";
            sessions.forEach((session) => list.appendChild(createHistoryRow(session)));
        }

        function renderHistoryPage(sessions) {
            historySessions = sessions;
            renderHistorySessions(sessions);
            document.getElementById("historyStatus").textContent = sessions.length
                ? `共 ${formatNumber(sessions.length)} 条历史会话`
                : "暂无会话记录";
        }

        async function showHistory() {
            const list = document.getElementById("historySessionList");
            const status = document.getElementById("historyStatus");
            status.textContent = "正在同步历史记录...";
            list.innerHTML = createHistoryLoadingMarkup();

            try {
                const response = await fetch("/chat/history");
                const data = await parseJson(response);
                if (!response.ok || !data.success) throw new Error(data.error || "获取历史记录失败");
                renderHistoryPage(Array.isArray(data.sessions) ? data.sessions : []);
            } catch (error) {
                historySessions = [];
                status.textContent = "读取失败";
                list.innerHTML = createHistoryErrorMarkup(error.message);
            }
        }

        async function loadHistorySession(targetSessionId) {
            try {
                const response = await fetch(`/chat/history/${targetSessionId}`);
                const data = await parseJson(response);
                if (!response.ok || !data.success) throw new Error(data.error || "加载历史记录失败");

                messages = [];
                document.getElementById("messagesList").innerHTML = "";
                document.getElementById("welcomeSection").style.display = "none";
                removeFile(false);
                resetInput();

                const info = document.createElement("div");
                info.className = "message assistant";
                info.innerHTML = `
                    <div class="message-avatar">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    </div>
                    <div class="message-content" style="background:#eef3ff;border:1px solid #cad4ff;">
                        <strong>已加载历史对话</strong><br>
                        对话时间：${esc(formatDate(data.session.timestamp))}<br>
                        对话模式：${esc(formatMode(data.session.mode))}<br>
                        消息数量：${formatNumber(data.session.messages.length)} 条<br><br>
                        <em style="color:#6c7387;">以下是恢复后的历史内容：</em>
                    </div>
                `;
                document.getElementById("messagesList").appendChild(info);

                data.session.messages.forEach((message) => {
                    addMessage(message.role, message.content);
                    messages.push(message);
                });

                currentMode = MODE_LABELS[data.session.mode] ? data.session.mode : "chat";
                document.querySelectorAll(".mode-tab").forEach((tab, index) => {
                    tab.classList.toggle("active", ["chat", "agent"][index] === currentMode);
                });
                updateUploads();

                sessionId = targetSessionId;
                switchSection("chat", getNavButton("chat"));
                addSystemMessage("已从历史记录恢复对话");
                scrollBottom();
                document.getElementById("userInput").focus();
            } catch (error) {
                alert(`加载历史记录失败: ${error.message}`);
            }
        }

        async function deleteHistorySession(targetSessionId) {
            if (!confirm("确定要删除这条历史记录吗？")) return;
            try {
                const response = await fetch(`/chat/history/${targetSessionId}`, { method: "DELETE" });
                const data = await parseJson(response);
                if (!response.ok || !data.success) throw new Error(data.error || "删除失败");

                if (sessionId === targetSessionId) {
                    messages = [];
                    sessionId = id();
                    document.getElementById("messagesList").innerHTML = "";
                    document.getElementById("welcomeSection").style.display = "flex";
                    removeFile(false);
                    resetInput();
                }

                await showHistory();
                if (currentSection === "chat") {
                    addSystemMessage("历史记录已删除");
                } else {
                    document.getElementById("historyStatus").textContent = "历史记录已删除";
                }
            } catch (error) {
                alert(`删除历史记录失败: ${error.message}`);
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            updateUploads();
            document.addEventListener("click", (event) => {
                const wrap = document.querySelector(".tool-menu-wrap");
                if (wrap && !wrap.contains(event.target)) closeToolMenu();
            });
            document.getElementById("userInput").focus();
        });
    </script>
</body>
</html>
